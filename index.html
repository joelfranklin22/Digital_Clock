<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="media-queries.css" />
    <script
      src="https://kit.fontawesome.com/2603c20c95.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='10' fill='black'/><text x='50' y='72' text-anchor='middle' font-family='monospace' font-size='52' font-weight='700' fill='%2300d4ff'>24</text></svg>"
    />
    <title>Digital Clock</title>
  </head>
  <body>
    <!-- Header Content -->
    <header class="nav-bar">
      <div class="head-logo">Digital Clock</div>
      <div class="clock-mode">
        <div class="live-mode">Clock</div>
        <div class="timer-mode">Timer</div>
      </div>
      <div class="right-nav">
        <ul>
          <li id="fullscreen-btn"><i class="fa-solid fa-expand"></i></li>
          <li id="light-mode"><i class="fa-solid fa-sun"></i></li>
          <li id="settings-btn">
            <i class="fa-solid fa-gear"></i>
          </li>
        </ul>
      </div>
    </header>
    <!-- End of Header -->
    <!-- Live Clock and Day&Year Section -->
    <section class="day-time-container">
      <div class="container side-move-time">
        <div id="hours">00</div>
        <div id="minutes">00</div>
        <div id="seconds">00</div>
      </div>
      <div id="day-year" class="side-move-day"></div>
    </section>
    <!-- End Live Clock and Day&Year Section -->
    <!-- Timer Section -->
    <section class="timer-container">
      <div class="container side-timer">
        <div id="hours-timer">00</div>
        <div id="minutes-timer">00</div>
        <div id="seconds-timer">00</div>
      </div>
      <div id="timer-controls">
        <i class="fa-regular fa-circle-pause pause"></i>
        <i class="fa-regular fa-circle-play play"></i>
        <i class="fa-solid fa-arrow-rotate-left reset"></i>
      </div>
    </section>
    <!-- End of Timer Section -->
    <!-- Settings Panel -->
    <section class="settings-panel">
      <aside class="aside-nav">
        <div class="nav-head">
          <h2 class="aside-nav-title">Settings</h2>
        </div>

        <div class="template-mode">
          <div class="clock-template-mode-day">
            <span class="date-year">Date and Year</span>

            <span class="date-toggle">
              <i class="fa-solid fa-toggle-off" id="toggle"></i>
            </span>
          </div>

          <h3 class="aside-nav-title">Clock Template</h3>
          <div class="clock-template-mode black-theme-btn">
            <span class="time">24:00:00</span>
            <span class="name">Digital</span>
          </div>

          <div class="clock-template-mode blue-theme-btn">
            <span class="time">24:00:00</span>
            <span class="name">Digital-Blue</span>
          </div>

          <div class="clock-template-mode red-theme-btn">
            <span class="time">24:00:00</span>
            <span class="name-red">Digital-Red</span>
          </div>

          <div class="clock-template-mode orange-theme-btn">
            <span class="time">24:00:00</span>
            <span class="name-orange">Digital-Orange</span>
          </div>
        </div>
      </aside>
    </section>
    <!-- End of Settings Panel -->
  </body>
  <script src="script.js"></script>
</html>
